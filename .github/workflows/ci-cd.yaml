name: CI Pipeline


on:
  push:
    branches: [main]

  pull_request: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOCKER_IMAGE: ${{ vars.DOCKER_IMAGE }}

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: set up node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: install deps
        run: npm ci

      - name: run tests
        run: npm test

  