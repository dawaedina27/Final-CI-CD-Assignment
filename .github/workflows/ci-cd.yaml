name: CI Pipeline


"on":
  push:
    branches: [master]

  pull_request:
    branches: [master]

env:
  DOCKER_IMAGE: ${{ vars.DOCKER_IMAGE }}

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: checkout code
        uses: actions/checkout@v6

      - name: set up node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: install deps
        run: npm ci

      - name: run tests
        run: npm test

  
